<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChronoPrecision — Stopky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- ===== Header ===== -->
  <header class="site-header">
    <a href="#" class="logo"><span class="logo-accent">Chrono</span>Precision</a>

    <nav class="main-nav" aria-label="Hlavná navigácia">
      <a href="#" class="nav-link is-active">Stopwatch</a>
      <a href="#" class="nav-link is-disabled" aria-disabled="true">Timer</a>
      <a href="#" class="nav-link is-disabled" aria-disabled="true">Intervals</a>
    </nav>

    <div class="header-actions">
      <button class="icon-btn" type="button" aria-label="História" title="História">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v5h5" /><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8" /><path d="M12 7v5l4 2" />
        </svg>
      </button>
      <button class="icon-btn" type="button" aria-label="Nastavenia" title="Nastavenia">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <main class="stage">
    <section class="timer-block" aria-label="Stopky">
      <!-- dekoratívne kruhy v pozadí -->
      <svg class="rings" viewBox="0 0 600 600" aria-hidden="true">
        <circle class="ring ring-outer" cx="300" cy="300" r="270" />
        <circle class="ring ring-mid" cx="300" cy="300" r="210" />
        <circle class="ring ring-dash" cx="300" cy="300" r="240" />
      </svg>

      <p class="session-label">Current Session</p>

      <!-- digitálny displej MM:SS.CS -->
      <div class="display" id="display" role="timer" aria-live="off">
        <span class="digit" data-d="m1">0</span><span class="digit" data-d="m2">0</span>
        <span class="sep">:</span>
        <span class="digit" data-d="s1">0</span><span class="digit" data-d="s2">0</span>
        <span class="sep dot">.</span>
        <span class="digit" data-d="c1">0</span><span class="digit" data-d="c2">0</span>
      </div>

      <div class="controls">
        <button id="lapBtn" class="btn btn-ghost" type="button" disabled>Lap</button>
        <button id="startBtn" class="btn btn-start" type="button">Štart</button>
        <button id="resetBtn" class="btn btn-reset" type="button" disabled>Reset</button>
      </div>
    </section>

    <!-- ===== Laps ===== -->
    <section class="laps" aria-label="História kôl">
      <div class="laps-head">
        <h2 class="laps-title">Laps History</h2>
        <div class="laps-counter">
          <span>Laps:</span>
          <span class="counter-badge" id="lapCount">0</span>
        </div>
      </div>

      <div class="laps-card">
        <div class="laps-table-head">
          <span>Lap #</span>
          <span class="col-center">Lap Time</span>
          <span class="col-right">Total Time</span>
        </div>
        <ul class="laps-list" id="lapsList">
          <li class="laps-empty" id="lapsEmpty">No laps recorded yet</li>
        </ul>
      </div>
    </section>

    <p class="hint">Skratky: <kbd>Medzerník</kbd> Štart/Pauza · <kbd>L</kbd> Lap · <kbd>R</kbd> Reset</p>
  </main>

  <script src="assets/js/script.js"></script>
</body>
</html>
